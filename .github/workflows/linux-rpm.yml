# .github/workflows/linux-rpm.yml
#
# Build HobbyCAD RPM packages for RHEL-compatible and Fedora distros.
#
# Uses containers on Ubuntu runners to build native RPMs:
#   - AlmaLinux 9 (RHEL 9 compatible, 2032 EOL) - matches Ubuntu 22.04 era
#   - Fedora 40 (current stable, newer packages)
#
# Both x86_64 and aarch64 architectures are supported.

name: Linux RPM

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  workflow_dispatch:

env:
  ACTIONS_STEP_DEBUG: true
  ACTIONS_RUNNER_DEBUG: true

jobs:

  # ================================================================
  #  RPM Build Matrix
  # ================================================================
  #
  #  Builds RPM packages using native containers.
  #  AlmaLinux 9 for enterprise/LTS users, Fedora 40 for latest.

  rpm:
    name: HobbyCAD RPM (${{ matrix.distro }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # AlmaLinux 9 (RHEL 9 compatible)
          - distro: almalinux9
            arch: x86_64
            runner: ubuntu-22.04
            container: almalinux:9
            artifact_name: hobbycad-almalinux9-x64
          - distro: almalinux9
            arch: aarch64
            runner: ubuntu-22.04-arm
            container: almalinux:9
            artifact_name: hobbycad-almalinux9-arm64
          # Fedora 40
          - distro: fedora40
            arch: x86_64
            runner: ubuntu-22.04
            container: fedora:40
            artifact_name: hobbycad-fedora40-x64
          - distro: fedora40
            arch: aarch64
            runner: ubuntu-22.04-arm
            container: fedora:40
            artifact_name: hobbycad-fedora40-arm64

    steps:
      - name: Install git (for checkout)
        run: |
          if command -v dnf &> /dev/null; then
            dnf install -y git
          elif command -v yum &> /dev/null; then
            yum install -y git
          fi

      - name: Checkout HobbyCAD
        uses: actions/checkout@v4

      - name: Install build dependencies (AlmaLinux 9)
        if: startsWith(matrix.distro, 'almalinux')
        run: |
          # Enable EPEL and CRB for additional packages
          dnf install -y epel-release
          dnf config-manager --set-enabled crb

          # Swap curl-minimal for full curl to avoid conflicts
          dnf swap -y curl-minimal curl || true

          # Build tools
          dnf install -y --allowerasing \
            gcc-c++ cmake ninja-build rpm-build \
            pkg-config git curl xz patch

          # Qt6 (from EPEL)
          dnf install -y \
            qt6-qtbase-devel qt6-qtsvg-devel qt6-qttools-devel

          # Other dependencies
          dnf install -y \
            mesa-libGL-devel mesa-libGLU-devel libxkbcommon-devel \
            tbb-devel libpng-devel libjpeg-devel \
            libzip-devel minizip-devel \
            libgit2-devel \
            lib3mf-devel \
            librsvg2-tools \
            freetype-devel fontconfig-devel \
            libX11-devel libXmu-devel libXi-devel libXext-devel \
            eigen3-devel

          # Build OpenCASCADE 7.9.2 from PPA source (not in EPEL for AlmaLinux 9)
          curl -L -o /tmp/occt.tar.xz "https://launchpad.net/~ayourk/+archive/ubuntu/hobbycad/+sourcefiles/opencascade/7.9.2+dfsg-4~ppa1~noble1/opencascade_7.9.2+dfsg.orig.tar.xz"
          mkdir -p /tmp/occt && tar -xJf /tmp/occt.tar.xz -C /tmp/occt --strip-components=1
          cmake -B /tmp/occt/build -S /tmp/occt -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_LIBRARY_TYPE=Shared \
            -DBUILD_MODULE_Draw=OFF \
            -DBUILD_MODULE_Visualization=ON \
            -DBUILD_MODULE_ApplicationFramework=ON \
            -DBUILD_MODULE_DataExchange=ON \
            -DUSE_TBB=OFF \
            -DUSE_VTK=OFF \
            -DUSE_FREETYPE=ON
          cmake --build /tmp/occt/build
          cmake --install /tmp/occt/build

          # Build OpenMesh from PPA source (not in EPEL for AlmaLinux 9)
          curl -L -o /tmp/openmesh.tar.gz "https://launchpad.net/~ayourk/+archive/ubuntu/hobbycad/+sourcefiles/libopenmesh/11.0.0.git~20260208-1~ppa1~noble1/libopenmesh_11.0.0.git~20260208.orig.tar.gz"
          mkdir -p /tmp/openmesh && tar -xzf /tmp/openmesh.tar.gz -C /tmp/openmesh --strip-components=1
          cd /tmp/openmesh
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_APPS=OFF
          cmake --build build
          cmake --install build

          # Build libslvs from PPA source (not packaged for RHEL)
          curl -L -o /tmp/libslvs.tar.gz "https://launchpad.net/~ayourk/+archive/ubuntu/hobbycad/+sourcefiles/libslvs/3.2.git~20260208-1~ppa2~noble1/libslvs_3.2.git~20260208.orig.tar.gz"
          mkdir -p /tmp/solvespace && tar -xzf /tmp/libslvs.tar.gz -C /tmp/solvespace --strip-components=1
          curl -L -o /tmp/libslvs.debian.tar.xz "https://launchpad.net/~ayourk/+archive/ubuntu/hobbycad/+sourcefiles/libslvs/3.2.git~20260208-1~ppa2~noble1/libslvs_3.2.git~20260208-1~ppa2~noble1.debian.tar.xz"
          tar -xJf /tmp/libslvs.debian.tar.xz -C /tmp/solvespace
          cd /tmp/solvespace && patch -p1 < debian/patches/0001-handle-missing-git-directory.patch

          # Stub empty submodule directories and populate Eigen from system package
          for submod in zlib libpng freetype cairo pixman angle; do
            mkdir -p extlib/$submod
            echo "# stub" > extlib/$submod/CMakeLists.txt
          done
          mkdir -p extlib/eigen
          cp -r /usr/include/eigen3/. extlib/eigen/

          # Override solvespace's set(CMAKE_CXX_STANDARD 11) — the -D flag cannot
          # override a normal variable, so we must patch the source directly
          sed -i 's/set(CMAKE_CXX_STANDARD 11)/set(CMAKE_CXX_STANDARD 14)/' CMakeLists.txt

          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_LIB=ON \
            -DENABLE_GUI=OFF \
            -DENABLE_CLI=OFF \
            -DENABLE_OPENMP=OFF \
            -DENABLE_TESTS=OFF
          cmake --build build
          cmake --install build

          # Build meshfix from PPA source (not packaged for RHEL)
          curl -L -o /tmp/meshfix.tar.gz "https://launchpad.net/~ayourk/+archive/ubuntu/hobbycad/+sourcefiles/meshfix/2.1.git~20260208-1~ppa1~noble1/meshfix_2.1.git~20260208.orig.tar.gz"
          mkdir -p /tmp/meshfix && tar -xzf /tmp/meshfix.tar.gz -C /tmp/meshfix --strip-components=1
          curl -L -o /tmp/meshfix.debian.tar.xz "https://launchpad.net/~ayourk/+archive/ubuntu/hobbycad/+sourcefiles/meshfix/2.1.git~20260208-1~ppa1~noble1/meshfix_2.1.git~20260208-1~ppa1~noble1.debian.tar.xz"
          tar -xJf /tmp/meshfix.debian.tar.xz -C /tmp/meshfix
          cd /tmp/meshfix && patch -p1 < debian/patches/0001-build-shared-library.patch
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMESHFIX_BUILD_SHARED=ON \
            -DMESHFIX_BUILD_CLI=OFF
          cmake --build build
          cmake --install build

      - name: Install build dependencies (Fedora)
        if: startsWith(matrix.distro, 'fedora')
        run: |
          dnf install -y \
            gcc-c++ cmake ninja-build rpm-build \
            pkg-config git curl xz patch \
            qt6-qtbase-devel qt6-qtsvg-devel qt6-qttools-devel \
            opencascade-devel \
            mesa-libGL-devel mesa-libGLU-devel mesa-libEGL-devel \
            libxkbcommon-devel \
            tbb-devel libpng-devel libjpeg-devel \
            libzip-devel minizip-devel \
            libgit2-devel \
            lib3mf-devel OpenMesh-devel \
            librsvg2-tools \
            eigen3-devel

          # Build libslvs from PPA source (solvespace package is GUI only)
          curl -L -o /tmp/libslvs.tar.gz "https://launchpad.net/~ayourk/+archive/ubuntu/hobbycad/+sourcefiles/libslvs/3.2.git~20260208-1~ppa2~noble1/libslvs_3.2.git~20260208.orig.tar.gz"
          mkdir -p /tmp/solvespace && tar -xzf /tmp/libslvs.tar.gz -C /tmp/solvespace --strip-components=1
          curl -L -o /tmp/libslvs.debian.tar.xz "https://launchpad.net/~ayourk/+archive/ubuntu/hobbycad/+sourcefiles/libslvs/3.2.git~20260208-1~ppa2~noble1/libslvs_3.2.git~20260208-1~ppa2~noble1.debian.tar.xz"
          tar -xJf /tmp/libslvs.debian.tar.xz -C /tmp/solvespace
          cd /tmp/solvespace && patch -p1 < debian/patches/0001-handle-missing-git-directory.patch

          # Stub empty submodule directories and populate Eigen from system package
          for submod in zlib libpng freetype cairo pixman angle; do
            mkdir -p extlib/$submod
            echo "# stub" > extlib/$submod/CMakeLists.txt
          done
          mkdir -p extlib/eigen
          cp -r /usr/include/eigen3/. extlib/eigen/

          # Override solvespace's set(CMAKE_CXX_STANDARD 11) — the -D flag cannot
          # override a normal variable, so we must patch the source directly
          sed -i 's/set(CMAKE_CXX_STANDARD 11)/set(CMAKE_CXX_STANDARD 14)/' CMakeLists.txt

          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_LIB=ON \
            -DENABLE_GUI=OFF \
            -DENABLE_CLI=OFF \
            -DENABLE_OPENMP=OFF \
            -DENABLE_TESTS=OFF
          cmake --build build
          cmake --install build

          # Build meshfix from PPA source (not packaged for Fedora)
          curl -L -o /tmp/meshfix.tar.gz "https://launchpad.net/~ayourk/+archive/ubuntu/hobbycad/+sourcefiles/meshfix/2.1.git~20260208-1~ppa1~noble1/meshfix_2.1.git~20260208.orig.tar.gz"
          mkdir -p /tmp/meshfix && tar -xzf /tmp/meshfix.tar.gz -C /tmp/meshfix --strip-components=1
          curl -L -o /tmp/meshfix.debian.tar.xz "https://launchpad.net/~ayourk/+archive/ubuntu/hobbycad/+sourcefiles/meshfix/2.1.git~20260208-1~ppa1~noble1/meshfix_2.1.git~20260208-1~ppa1~noble1.debian.tar.xz"
          tar -xJf /tmp/meshfix.debian.tar.xz -C /tmp/meshfix
          cd /tmp/meshfix && patch -p1 < debian/patches/0001-build-shared-library.patch
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMESHFIX_BUILD_SHARED=ON \
            -DMESHFIX_BUILD_CLI=OFF
          cmake --build build
          cmake --install build

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build

      - name: Create RPM package structure
        run: |
          # Install to a staging directory
          DESTDIR=$(pwd)/rpm-root cmake --install build

          # Create RPM spec file
          VERSION=$(grep 'project.*VERSION' CMakeLists.txt | sed -E 's/.*VERSION[[:space:]]+([0-9.]+).*/\1/' | head -1)
          VERSION=${VERSION:-0.0.1}

          mkdir -p rpmbuild/{SPECS,SOURCES,BUILD,RPMS,SRPMS}

          cat > rpmbuild/SPECS/hobbycad.spec << EOF
          Name:           hobbycad
          Version:        ${VERSION}
          Release:        1%{?dist}
          Summary:        Parametric 3D CAD Application
          License:        GPL-3.0-only
          URL:            https://github.com/ayourk/hobbycad

          %description
          HobbyCAD is a Linux-native open-source parametric 3D CAD application
          built with Qt6 and OpenCASCADE.

          %install
          cp -a %{_builddir}/rpm-root/* %{buildroot}/

          %files
          /usr/bin/hobbycad
          /usr/lib*/libhobbycad*
          /usr/include/hobbycad/
          /usr/share/applications/hobbycad.desktop
          /usr/share/icons/hicolor/*/apps/hobbycad.*
          /usr/share/pixmaps/hobbycad.xpm

          %changelog
          * $(date '+%a %b %d %Y') HobbyCAD CI <ci@hobbycad.org> - ${VERSION}-1
          - Automated build from CI
          EOF

          # Copy installed files to BUILD directory for rpmbuild
          cp -a rpm-root rpmbuild/BUILD/

      - name: Build RPM
        run: |
          rpmbuild --define "_topdir $(pwd)/rpmbuild" \
                   --define "_builddir $(pwd)/rpmbuild/BUILD" \
                   -bb rpmbuild/SPECS/hobbycad.spec

          # Move RPM to workspace root for upload
          find rpmbuild/RPMS -name "*.rpm" -exec cp {} . \;

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-rpm
          path: "*.rpm"
          retention-days: 14
          if-no-files-found: error
