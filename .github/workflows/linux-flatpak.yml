# .github/workflows/linux-flatpak.yml
#
# Build HobbyCAD Flatpak for universal Linux distribution.
#
# Flatpak provides sandboxed, distribution-independent packages.
# Works on virtually all Linux distros including:
#   - SteamOS (preferred installation method)
#   - Fedora, Ubuntu, Debian, Arch, openSUSE, etc.
#
# Both x86_64 and aarch64 architectures are supported.

name: Linux Flatpak

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  workflow_dispatch:

jobs:

  # ================================================================
  #  Flatpak Build
  # ================================================================
  #
  #  Builds Flatpak bundles using flatpak-builder.
  #  Uses the KDE runtime for Qt6 support.

  flatpak:
    name: HobbyCAD Flatpak (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
            flatpak_arch: x86_64
            artifact_name: hobbycad-flatpak-x86_64
          - arch: aarch64
            runner: ubuntu-22.04-arm
            flatpak_arch: aarch64
            artifact_name: hobbycad-flatpak-aarch64

    steps:
      - name: Checkout HobbyCAD
        uses: actions/checkout@v4

      - name: Install Flatpak and flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Add Flathub repository
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install Flatpak SDK and runtime
        run: |
          # Install KDE runtime and SDK for Qt6 support
          flatpak install --user -y flathub org.kde.Platform//6.6
          flatpak install --user -y flathub org.kde.Sdk//6.6

      - name: Create Flatpak manifest
        run: |
          VERSION=$(grep 'project.*VERSION' CMakeLists.txt | sed -E 's/.*VERSION[[:space:]]+([0-9.]+).*/\1/' | head -1)
          VERSION=${VERSION:-0.0.1}

          cat > org.hobbycad.HobbyCAD.yml << EOF
          app-id: org.hobbycad.HobbyCAD
          runtime: org.kde.Platform
          runtime-version: '6.6'
          sdk: org.kde.Sdk
          command: hobbycad
          finish-args:
            # X11 + Wayland
            - --share=ipc
            - --socket=x11
            - --socket=wayland
            # OpenGL
            - --device=dri
            # File access for loading/saving projects
            - --filesystem=home
            # For IPC with other apps if needed
            - --talk-name=org.freedesktop.Notifications

          modules:
            # OpenCASCADE
            - name: opencascade
              buildsystem: cmake-ninja
              config-opts:
                - -DCMAKE_BUILD_TYPE=Release
                - -DBUILD_LIBRARY_TYPE=Shared
                - -DBUILD_MODULE_Draw=OFF
                - -DBUILD_MODULE_Visualization=ON
                - -DBUILD_MODULE_ApplicationFramework=ON
                - -DBUILD_MODULE_DataExchange=ON
                - -DUSE_TBB=ON
                - -DUSE_FREETYPE=ON
              sources:
                - type: archive
                  url: https://github.com/Open-Cascade-SAS/OCCT/archive/refs/tags/V7_6_3.tar.gz
                  sha256: 3f95808e2c5060c5b5001770b5e42c7d9a849b23d925272bc70a5a2377413aa9

            # libgit2
            - name: libgit2
              buildsystem: cmake-ninja
              config-opts:
                - -DCMAKE_BUILD_TYPE=Release
                - -DBUILD_TESTS=OFF
                - -DBUILD_CLI=OFF
              sources:
                - type: archive
                  url: https://github.com/libgit2/libgit2/archive/refs/tags/v1.7.2.tar.gz
                  sha256: de384e29d7efc9330c6cdb126ebf88342b5025d920dcb7c645defad85195ea7f

            # libslvs (SolveSpace constraint solver library)
            # Source from Launchpad PPA with patches applied
            - name: libslvs
              buildsystem: cmake-ninja
              config-opts:
                - -DCMAKE_BUILD_TYPE=Release
                - -DBUILD_LIB=ON
                - -DENABLE_GUI=OFF
                - -DENABLE_CLI=OFF
                - -DENABLE_OPENMP=OFF
                - -DENABLE_TESTS=OFF
              sources:
                - type: archive
                  url: https://launchpad.net/~ayourk/+archive/ubuntu/hobbycad/+sourcefiles/libslvs/3.2.git~20260208-1~ppa2~noble1/libslvs_3.2.git~20260208.orig.tar.gz
                  sha256: 89221ff3a92f9e4d59f61ca86cf82bb38cf313183be660fdd7b628da66790864
                - type: archive
                  url: https://launchpad.net/~ayourk/+archive/ubuntu/hobbycad/+sourcefiles/libslvs/3.2.git~20260208-1~ppa2~noble1/libslvs_3.2.git~20260208-1~ppa2~noble1.debian.tar.xz
                  dest: debian-patches
                - type: shell
                  commands:
                    - patch -p1 < debian-patches/debian/patches/0001-handle-missing-git-directory.patch
                    - for submod in zlib libpng freetype cairo pixman angle; do mkdir -p extlib/\$submod && echo "# stub" > extlib/\$submod/CMakeLists.txt; done

            # lib3mf (3D Manufacturing Format)
            # Source from Launchpad PPA
            - name: lib3mf
              buildsystem: cmake-ninja
              config-opts:
                - -DCMAKE_BUILD_TYPE=Release
                - -DLIB3MF_TESTS=OFF
              sources:
                - type: archive
                  url: https://launchpad.net/~ayourk/+archive/ubuntu/hobbycad/+sourcefiles/lib3mf/2.4.1.git~20260208-1~ppa1~noble1/lib3mf_2.4.1.git~20260208.orig.tar.gz
                  sha256: 469f4b8780ee4c369b695210611d70fc70e8e4b22da6ea97265f69c9a50828b1

            # OpenMesh
            # Source from Launchpad PPA
            - name: openmesh
              buildsystem: cmake-ninja
              config-opts:
                - -DCMAKE_BUILD_TYPE=Release
                - -DOPENMESH_BUILD_SHARED=ON
                - -DOPENMESH_BUILD_PYTHON_BINDINGS=OFF
              sources:
                - type: archive
                  url: https://launchpad.net/~ayourk/+archive/ubuntu/hobbycad/+sourcefiles/libopenmesh/11.0.0.git~20260208-1~ppa1~noble1/libopenmesh_11.0.0.git~20260208.orig.tar.gz
                  sha256: b6f0a3eb3078984ca651b6bf38a781a072049222f77bac1025101371fca18899

            # MeshFix
            # Source from Launchpad PPA with patches applied
            - name: meshfix
              buildsystem: cmake-ninja
              config-opts:
                - -DCMAKE_BUILD_TYPE=Release
                - -DMESHFIX_BUILD_SHARED=ON
                - -DMESHFIX_BUILD_CLI=OFF
              sources:
                - type: archive
                  url: https://launchpad.net/~ayourk/+archive/ubuntu/hobbycad/+sourcefiles/meshfix/2.1.git~20260208-1~ppa1~noble1/meshfix_2.1.git~20260208.orig.tar.gz
                  sha256: 27d135e85e320439df49d96c8de79042d2cbb524f9aa952eb7a8544571131fbf
                - type: archive
                  url: https://launchpad.net/~ayourk/+archive/ubuntu/hobbycad/+sourcefiles/meshfix/2.1.git~20260208-1~ppa1~noble1/meshfix_2.1.git~20260208-1~ppa1~noble1.debian.tar.xz
                  dest: debian-patches
                - type: shell
                  commands:
                    - patch -p1 < debian-patches/debian/patches/0001-build-shared-library.patch

            # HobbyCAD
            - name: hobbycad
              buildsystem: cmake-ninja
              config-opts:
                - -DCMAKE_BUILD_TYPE=Release
              sources:
                - type: dir
                  path: .
          EOF

      - name: Build Flatpak
        run: |
          flatpak-builder --user --force-clean --repo=repo \
            builddir org.hobbycad.HobbyCAD.yml

      - name: Create Flatpak bundle
        run: |
          flatpak build-bundle repo HobbyCAD-${{ matrix.arch }}.flatpak \
            org.hobbycad.HobbyCAD

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: "*.flatpak"
          retention-days: 14
          if-no-files-found: error
