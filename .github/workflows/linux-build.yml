# .github/workflows/linux-build.yml
#
# Build HobbyCAD on Ubuntu 22.04 and 24.04 for x86_64 and arm64.
#
# Ubuntu 22.04 (glibc 2.35) provides broader compatibility.
# Ubuntu 24.04 (glibc 2.39) uses newer libraries.
# Both LTS releases are supported for the duration of their lifecycle.

name: Linux Build

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  workflow_dispatch:

env:
  ACTIONS_STEP_DEBUG: true
  ACTIONS_RUNNER_DEBUG: true

jobs:

  # ================================================================
  #  Ubuntu / GCC / apt
  # ================================================================
  #
  #  Builds on both Ubuntu 22.04 and 24.04 for x86_64 and arm64.
  #  All dependencies come from Ubuntu repositories.

  linux:
    name: HobbyCAD Linux (${{ matrix.os }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu 22.04
          - os: ubuntu-22.04
            arch: x86_64
            runner: ubuntu-22.04
            artifact_name: hobbycad-linux-ubuntu2204-x64
          - os: ubuntu-22.04
            arch: aarch64
            runner: ubuntu-22.04-arm
            artifact_name: hobbycad-linux-ubuntu2204-arm64
          # Ubuntu 24.04
          - os: ubuntu-24.04
            arch: x86_64
            runner: ubuntu-24.04
            artifact_name: hobbycad-linux-ubuntu2404-x64
          - os: ubuntu-24.04
            arch: aarch64
            runner: ubuntu-24.04-arm
            artifact_name: hobbycad-linux-ubuntu2404-arm64

    steps:
      - name: Checkout HobbyCAD
        uses: actions/checkout@v4

      - name: Add HobbyCAD PPA
        run: |
          sudo add-apt-repository -y ppa:ayourk/hobbycad
          echo 'Package: *
          Pin: release o=LP-PPA-ayourk-hobbycad
          Pin-Priority: 1001' | sudo tee /etc/apt/preferences.d/hobbycad-ppa
          sudo apt-get update

      # Remove stock Qt 6.2 packages that conflict with PPA's Qt 6.4.2
      - name: Remove stock Qt 6.2 (Ubuntu 22.04)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get remove -y 'libqt6*' 'qt6-*' 2>/dev/null || true
          sudo apt-get autoremove -y

      # Install Qt 6.4.2 from PPA
      - name: Install Qt 6.4.2 from PPA (Ubuntu 22.04)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get install -y \
            qt6-base-dev qt6-base-dev-tools \
            libqt6openglwidgets6 qmake6 \
            qt6-tools-dev qt6-tools-dev-tools qt6-l10n-tools \
            qt6-svg-dev

      - name: Install dependencies
        run: |
          sudo apt-get install -y \
            libslvs-dev \
            build-essential cmake ninja-build pkg-config \
            libocct-data-exchange-dev libocct-draw-dev \
            libocct-foundation-dev libocct-modeling-algorithms-dev \
            libocct-modeling-data-dev libocct-ocaf-dev \
            libocct-visualization-dev occt-misc libtbb-dev \
            qt6-base-dev qt6-base-dev-tools qt6-tools-dev \
            qt6-tools-dev-tools qt6-l10n-tools \
            libqt6openglwidgets6 qt6-svg-dev qmake6 \
            libgl-dev libglu1-mesa-dev libegl-dev libxkbcommon-dev \
            libpng-dev libjpeg-dev \
            libzip-dev libminizip-dev \
            libgit2-dev \
            lib3mf-dev libopenmesh-dev libmeshfix-dev \
            librsvg2-bin

      - name: Configure CMake
        run: cmake --preset linux-release

      - name: Build
        run: cmake --build --preset linux-release

      - name: Package build
        run: |
          cmake --install build --prefix build/install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/install/
          retention-days: 14
          if-no-files-found: error
