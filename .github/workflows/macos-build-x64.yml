# .github/workflows/macos-build-x64.yml
#
# Build HobbyCAD on macOS x86_64 (Intel) using vcpkg with static
# linking.  All third-party dependencies are statically linked.
#
# Separated from the arm64 workflow because the x86_64 runner
# (macos-13-large) is a paid runner that may not always be available.
# Keeping it in its own workflow prevents cancellation of arm64 builds.

name: macOS Build x64

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  workflow_dispatch:

env:
  ACTIONS_STEP_DEBUG: true
  ACTIONS_RUNNER_DEBUG: true

jobs:

  macos-x64:
    name: HobbyCAD macOS (x86_64)
    runs-on: macos-13-large

    env:
      BUILD_TYPE: Release
      VCPKG_DEFAULT_TRIPLET: x64-osx-static
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - name: Checkout HobbyCAD
        uses: actions/checkout@v4

      - name: Install build tools
        run: brew install ninja

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        run: |
          git clone --branch 2026.01.16 https://github.com/microsoft/vcpkg.git ~/vcpkg
          ~/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV
          echo "$HOME/vcpkg" >> $GITHUB_PATH

      - name: Clear vcpkg registry cache
        run: rm -rf ~/.cache/vcpkg/registries

      - name: Install dependencies via vcpkg
        run: |
          vcpkg install --triplet x64-osx-static \
            --overlay-triplets=${{ github.workspace }}/vcpkg-custom-triplets \
            --x-install-root=vcpkg_installed \
            --clean-buildtrees-after-build

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_TOOLCHAIN_FILE=$HOME/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=x64-osx-static \
            -DVCPKG_OVERLAY_TRIPLETS=${{ github.workspace }}/vcpkg-custom-triplets \
            -DVCPKG_INSTALLED_DIR=${{ github.workspace }}/vcpkg_installed

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Package build
        run: |
          cmake --install build --prefix build/install

          # Static build — single executable, no dylibs to bundle
          exe="build/install/bin/hobbycad"
          if [ ! -f "$exe" ]; then
            echo "::error::hobbycad not found at $exe"
            exit 1
          fi
          echo "Static build produced: $exe"
          echo "Size: $(du -h "$exe" | cut -f1)"
          echo "Architecture: $(file "$exe")"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hobbycad-macos-x64
          path: build/install/
          retention-days: 14
          if-no-files-found: error
