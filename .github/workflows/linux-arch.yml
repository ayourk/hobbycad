# .github/workflows/linux-arch.yml
#
# Build HobbyCAD pacman packages for Arch-based distros.
#
# Uses Arch Linux containers to build native packages:
#   - Arch Linux (rolling release, base for derivatives)
#   - Works on: Arch, CachyOS, Manjaro, EndeavourOS, SteamOS (unlocked)
#
# Both x86_64 and aarch64 architectures are supported.

name: Linux Arch

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  workflow_dispatch:

env:
  ACTIONS_STEP_DEBUG: true
  ACTIONS_RUNNER_DEBUG: true

jobs:

  # ================================================================
  #  Arch Linux pacman package
  # ================================================================
  #
  #  Builds .pkg.tar.zst packages using makepkg in Arch containers.
  #  Compatible with Arch, CachyOS, Manjaro, EndeavourOS, SteamOS.

  arch:
    name: HobbyCAD Arch (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
            container: archlinux:base-devel
            artifact_name: hobbycad-arch-x86_64
          - arch: aarch64
            runner: ubuntu-22.04-arm
            container: agners/archlinuxarm:latest
            artifact_name: hobbycad-arch-aarch64

    steps:
      - name: Setup pacman and install git
        run: |
          # Disable Landlock sandbox for pacman (Docker container compatibility)
          mkdir -p /etc/pacman.d
          echo 'DisableSandbox' >> /etc/pacman.conf || true

          # Initialize pacman keyring
          pacman-key --init
          pacman-key --populate archlinux || pacman-key --populate archlinuxarm || true

          # Update system and install git and base-devel
          pacman -Syu --noconfirm git base-devel

      - name: Checkout HobbyCAD
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -S --noconfirm --needed \
            base-devel cmake ninja pkgconf curl patch xz tar \
            qt6-base qt6-svg qt6-tools \
            opencascade tbb \
            libpng libjpeg-turbo \
            libzip minizip \
            libgit2 \
            lib3mf \
            librsvg \
            mesa glu libxkbcommon \
            eigen

          # Build OpenMesh from PPA source (AUR package, not in official repos)
          curl -L -o /tmp/openmesh.tar.gz "https://launchpad.net/~ayourk/+archive/ubuntu/hobbycad/+sourcefiles/libopenmesh/11.0.0.git~20260208-1~ppa1~noble1/libopenmesh_11.0.0.git~20260208.orig.tar.gz"
          mkdir -p /tmp/openmesh && tar -xzf /tmp/openmesh.tar.gz -C /tmp/openmesh --strip-components=1
          cd /tmp/openmesh
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_APPS=OFF
          cmake --build build
          cmake --install build

          # Build libslvs from PPA source (solvespace package is GUI only)
          curl -L -o /tmp/libslvs.tar.gz "https://launchpad.net/~ayourk/+archive/ubuntu/hobbycad/+sourcefiles/libslvs/3.2.git~20260208-1~ppa2~noble1/libslvs_3.2.git~20260208.orig.tar.gz"
          mkdir -p /tmp/solvespace && tar -xzf /tmp/libslvs.tar.gz -C /tmp/solvespace --strip-components=1
          curl -L -o /tmp/libslvs.debian.tar.xz "https://launchpad.net/~ayourk/+archive/ubuntu/hobbycad/+sourcefiles/libslvs/3.2.git~20260208-1~ppa2~noble1/libslvs_3.2.git~20260208-1~ppa2~noble1.debian.tar.xz"
          tar -xJf /tmp/libslvs.debian.tar.xz -C /tmp/solvespace
          cd /tmp/solvespace && patch -p1 < debian/patches/0001-handle-missing-git-directory.patch

          # Stub empty submodule directories and populate Eigen from system package
          for submod in zlib libpng freetype cairo pixman angle; do
            mkdir -p extlib/$submod
            echo "# stub" > extlib/$submod/CMakeLists.txt
          done
          mkdir -p extlib/eigen
          cp -r /usr/include/eigen3/. extlib/eigen/

          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_LIB=ON \
            -DENABLE_GUI=OFF \
            -DENABLE_CLI=OFF \
            -DENABLE_OPENMP=OFF \
            -DENABLE_TESTS=OFF
          cmake --build build
          cmake --install build

          # Build meshfix from PPA source (not packaged for Arch)
          curl -L -o /tmp/meshfix.tar.gz "https://launchpad.net/~ayourk/+archive/ubuntu/hobbycad/+sourcefiles/meshfix/2.1.git~20260208-1~ppa1~noble1/meshfix_2.1.git~20260208.orig.tar.gz"
          mkdir -p /tmp/meshfix && tar -xzf /tmp/meshfix.tar.gz -C /tmp/meshfix --strip-components=1
          curl -L -o /tmp/meshfix.debian.tar.xz "https://launchpad.net/~ayourk/+archive/ubuntu/hobbycad/+sourcefiles/meshfix/2.1.git~20260208-1~ppa1~noble1/meshfix_2.1.git~20260208-1~ppa1~noble1.debian.tar.xz"
          tar -xJf /tmp/meshfix.debian.tar.xz -C /tmp/meshfix
          cd /tmp/meshfix && patch -p1 < debian/patches/0001-build-shared-library.patch
          # Use CMAKE_POLICY_VERSION_MINIMUM for newer CMake compatibility
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DMESHFIX_BUILD_SHARED=ON \
            -DMESHFIX_BUILD_CLI=OFF
          cmake --build build
          cmake --install build

      - name: Create PKGBUILD
        run: |
          VERSION=$(grep 'project.*VERSION' CMakeLists.txt | sed -E 's/.*VERSION[[:space:]]+([0-9.]+).*/\1/' | head -1)
          VERSION=${VERSION:-0.0.1}

          mkdir -p pkgbuild
          cat > pkgbuild/PKGBUILD << 'EOF'
          # Maintainer: Aaron Yourk <ayourk@gmail.com>
          pkgname=hobbycad
          pkgver=VERSION_PLACEHOLDER
          pkgrel=1
          pkgdesc="Parametric 3D CAD Application"
          arch=('x86_64' 'aarch64')
          url="https://github.com/ayourk/hobbycad"
          license=('GPL-3.0-only')
          depends=(
            'qt6-base'
            'qt6-svg'
            'opencascade'
            'tbb'
            'libgit2'
            'libzip'
            'minizip'
            'lib3mf'
          )
          makedepends=(
            'cmake'
            'ninja'
            'qt6-tools'
            'librsvg'
          )
          source=()

          build() {
            cd "$startdir/.."
            cmake -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=/usr
            cmake --build build
          }

          package() {
            cd "$startdir/.."
            DESTDIR="$pkgdir" cmake --install build
          }
          EOF

          # Replace version placeholder
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/" pkgbuild/PKGBUILD

      - name: Build package
        run: |
          # makepkg cannot run as root, create a build user
          useradd -m builder
          chown -R builder:builder .

          cd pkgbuild
          # Allow building as root via env var workaround, or use builder user
          su builder -c "makepkg -sf --noconfirm"

          # Copy package to workspace root
          cp *.pkg.tar.zst ../ || cp *.pkg.tar.xz ../

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-pkg
          path: "*.pkg.tar.*"
          retention-days: 14
          if-no-files-found: error
