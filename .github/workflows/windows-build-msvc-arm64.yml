# .github/workflows/windows-build-msvc-arm64.yml
#
# Build HobbyCAD on Windows arm64 using MSVC with vcpkg manifest
# mode.  Cross-compiles from x64 host to arm64 target.
#
# This workflow runs on its own runner to maximise available disk
# space.  vcpkg must compile most packages from source for arm64
# (no pre-built binaries), so builds are slower and use more disk
# than the x64 MSVC workflow.

name: Windows Build (MSVC arm64)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  workflow_dispatch:

env:
  ACTIONS_STEP_DEBUG: true
  ACTIONS_RUNNER_DEBUG: true

jobs:

  msvc-arm64:
    name: HobbyCAD via MSVC (arm64)
    runs-on: windows-latest

    env:
      BUILD_TYPE: Release
      VCPKG_DEFAULT_TRIPLET: arm64-windows
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - name: Checkout HobbyCAD
        uses: actions/checkout@v4

      - name: Free disk space
        shell: pwsh
        run: |
          # Aggressively remove pre-installed components — arm64 vcpkg builds
          # compile everything from source and need maximum available disk.
          $dirs = @(
            "C:\Android",
            "C:\Program Files\dotnet\sdk",
            "C:\Program Files\dotnet\shared",
            "C:\Program Files\LLVM",
            "C:\Program Files (x86)\Microsoft SDKs\Azure",
            "C:\Program Files\MongoDB",
            "C:\Program Files\PostgreSQL",
            "C:\Program Files (x86)\Google",
            "C:\Program Files\Google",
            "C:\Program Files (x86)\Windows Kits\10\Testing",
            "C:\Program Files\Microsoft SQL Server",
            "C:\Program Files (x86)\Microsoft SQL Server",
            "C:\hostedtoolcache",
            "C:\SeleniumWebDrivers",
            "C:\Strawberry",
            "C:\ghcup",
            "C:\Modules"
          )
          foreach ($d in $dirs) {
            if (Test-Path $d) {
              Write-Host "Removing $d ..."
              Remove-Item -Recurse -Force $d -ErrorAction SilentlyContinue
            }
          }
          # Show available space
          Get-PSDrive C | Select-Object Used,Free | Format-Table -AutoSize

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        run: |
          # Use the pre-installed vcpkg on the runner, or clone fresh
          if (Test-Path "C:\vcpkg\vcpkg.exe") {
              Write-Host "Using pre-installed vcpkg at C:\vcpkg"
          } elseif (Test-Path "C:\vcpkg") {
              Write-Host "Bootstrapping existing C:\vcpkg..."
              & C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          } else {
              Write-Host "Cloning vcpkg..."
              git clone --depth 1 https://github.com/microsoft/vcpkg.git C:\vcpkg
              & C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          }
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "C:\vcpkg" >> $env:GITHUB_PATH

      - name: Setup MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_arm64

      - name: Install dependencies via vcpkg
        run: |
          vcpkg install --triplet arm64-windows `
            --overlay-ports=${{ github.workspace }}/vcpkg-overlay-ports `
            --x-install-root=vcpkg_installed `
            --clean-buildtrees-after-build

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=arm64-windows `
            -DVCPKG_INSTALLED_DIR=${{ github.workspace }}\vcpkg_installed `
            -DVCPKG_OVERLAY_PORTS=${{ github.workspace }}\vcpkg-overlay-ports

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Package build
        shell: pwsh
        run: |
          $installDir = "build\install"
          cmake --install build --prefix $installDir

          # Copy Qt and OCCT runtime DLLs alongside the executable
          $binDir = "$installDir\bin"
          $vcpkgBin = "${{ github.workspace }}\vcpkg_installed\arm64-windows\bin"

          # Qt platform plugin — search multiple possible vcpkg locations
          $qtPluginDir = "$installDir\bin\platforms"
          New-Item -ItemType Directory -Force -Path $qtPluginDir | Out-Null
          $qwin = Get-ChildItem -Path "${{ github.workspace }}\vcpkg_installed" -Filter "qwindows.dll" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($qwin) {
              Copy-Item $qwin.FullName $qtPluginDir
              Write-Host "Found qwindows.dll at: $($qwin.FullName)"
          } else {
              Write-Warning "qwindows.dll not found in vcpkg_installed — app may not launch"
          }

          # Copy all runtime DLLs the executable needs
          $exePath = Get-ChildItem "$binDir\hobbycad.exe" -ErrorAction SilentlyContinue
          if ($exePath) {
              $deps = & dumpbin /dependents $exePath.FullName 2>$null |
                      Select-String '\.dll' |
                      ForEach-Object { $_.ToString().Trim() }
              foreach ($dll in $deps) {
                  $src = Join-Path $vcpkgBin $dll
                  if (Test-Path $src) {
                      Copy-Item $src $binDir -ErrorAction SilentlyContinue
                  }
              }
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hobbycad-windows-arm64-msvc
          path: build/install/
          retention-days: 14
          if-no-files-found: error
