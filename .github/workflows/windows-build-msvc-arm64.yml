# .github/workflows/windows-build-msvc-arm64.yml
#
# Build HobbyCAD on Windows arm64 using MSVC with vcpkg manifest
# mode.  Cross-compiles from x64 host to arm64 target.
#
# This workflow runs on its own runner to maximise available disk
# space.  vcpkg must compile most packages from source for arm64
# (no pre-built binaries), so builds are slower and use more disk
# than the x64 MSVC workflow.

name: Windows Build (MSVC arm64)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  workflow_dispatch:

env:
  ACTIONS_STEP_DEBUG: true
  ACTIONS_RUNNER_DEBUG: true

jobs:

  msvc-arm64:
    name: HobbyCAD via MSVC (arm64)
    runs-on: windows-latest

    env:
      BUILD_TYPE: Release
      VCPKG_DEFAULT_TRIPLET: arm64-windows-static-md
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - name: Checkout HobbyCAD
        uses: actions/checkout@v4

      - name: Free disk space
        shell: pwsh
        run: |
          # Aggressively remove pre-installed components — arm64 vcpkg builds
          # compile everything from source and need maximum available disk.
          $dirs = @(
            "C:\Android",
            "C:\Program Files\dotnet\sdk",
            "C:\Program Files\dotnet\shared",
            "C:\Program Files\LLVM",
            "C:\Program Files (x86)\Microsoft SDKs\Azure",
            "C:\Program Files\MongoDB",
            "C:\Program Files\PostgreSQL",
            "C:\Program Files (x86)\Google",
            "C:\Program Files\Google",
            "C:\Program Files (x86)\Windows Kits\10\Testing",
            "C:\Program Files\Microsoft SQL Server",
            "C:\Program Files (x86)\Microsoft SQL Server",
            "C:\hostedtoolcache",
            "C:\SeleniumWebDrivers",
            "C:\Strawberry",
            "C:\ghcup",
            "C:\Modules"
          )
          foreach ($d in $dirs) {
            if (Test-Path $d) {
              Write-Host "Removing $d ..."
              Remove-Item -Recurse -Force $d -ErrorAction SilentlyContinue
            }
          }
          # Show available space
          Get-PSDrive C | Select-Object Used,Free | Format-Table -AutoSize

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        run: |
          # Clone the exact baseline version to ensure version overrides work
          if (Test-Path "C:\vcpkg") {
              Remove-Item -Recurse -Force C:\vcpkg
          }
          git clone --branch 2026.01.16 https://github.com/microsoft/vcpkg.git C:\vcpkg
          & C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "C:\vcpkg" >> $env:GITHUB_PATH

      - name: Setup MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_arm64

      - name: Install dependencies via vcpkg
        run: |
          vcpkg install --triplet arm64-windows-static-md --host-triplet=x64-windows `
            --overlay-triplets=${{ github.workspace }}/vcpkg-custom-triplets `
            --x-install-root=vcpkg_installed `
            --clean-buildtrees-after-build

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=arm64-windows-static-md `
            -DVCPKG_OVERLAY_TRIPLETS=${{ github.workspace }}\vcpkg-custom-triplets `
            -DVCPKG_INSTALLED_DIR=${{ github.workspace }}\vcpkg_installed

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Package build
        shell: pwsh
        run: |
          $installDir = "build\install"
          cmake --install build --prefix $installDir

          # Static build — all dependencies linked into the executable.
          # No DLLs or Qt plugins to copy.
          $exe = "$installDir\bin\hobbycad.exe"
          if (-not (Test-Path $exe)) {
              Write-Error "hobbycad.exe not found at $exe"
              exit 1
          }
          Write-Host "Static build produced: $exe"
          Write-Host "Size: $([math]::Round((Get-Item $exe).Length / 1MB, 1)) MB"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hobbycad-windows-arm64-msvc
          path: build/install/
          retention-days: 14
          if-no-files-found: error
