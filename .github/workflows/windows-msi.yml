# .github/workflows/windows-msi.yml
#
# Build HobbyCAD MSI installer using WiX Toolset.
#
# Creates MSI installers for enterprise deployment:
#   - Suitable for Group Policy / SCCM deployment
#   - Per-machine installation to Program Files
#   - Start menu shortcuts and file associations
#   - Clean uninstall via Add/Remove Programs
#
# Both x64 and arm64 architectures are supported.

name: Windows MSI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  workflow_dispatch:

env:
  ACTIONS_STEP_DEBUG: true
  ACTIONS_RUNNER_DEBUG: true

jobs:

  # ================================================================
  #  MSI Installer via WiX
  # ================================================================
  #
  #  Builds MSI installers using WiX Toolset v4.
  #  Uses MSVC build output as the source.

  msi:
    name: HobbyCAD MSI (${{ matrix.arch }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            triplet: x64-windows-static-md
            msvc_arch: x64
            wix_arch: x64
            artifact_name: hobbycad-windows-x64-msi
          - arch: arm64
            triplet: arm64-windows-static-md
            msvc_arch: amd64_arm64
            wix_arch: arm64
            artifact_name: hobbycad-windows-arm64-msi

    env:
      BUILD_TYPE: Release
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - name: Checkout HobbyCAD
        uses: actions/checkout@v4

      - name: Free disk space
        shell: pwsh
        run: |
          # Remove large pre-installed components to free disk for vcpkg builds
          # Note: do NOT remove dotnet — WiX Toolset requires the .NET SDK
          $dirs = @(
            "C:\Android",
            "C:\Program Files\LLVM",
            "C:\Program Files (x86)\Microsoft SDKs\Azure",
            "C:\Program Files\MongoDB",
            "C:\Program Files\PostgreSQL"
          )
          foreach ($d in $dirs) {
            if (Test-Path $d) {
              Write-Host "Removing $d ..."
              Remove-Item -Recurse -Force $d -ErrorAction SilentlyContinue
            }
          }
          # Show available space
          Get-PSDrive C | Select-Object Used,Free | Format-Table -AutoSize

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        run: |
          # Clone the exact baseline version to ensure version overrides work
          if (Test-Path "C:\vcpkg") {
              Remove-Item -Recurse -Force C:\vcpkg
          }
          git clone --branch 2026.01.16 https://github.com/microsoft/vcpkg.git C:\vcpkg
          & C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "C:\vcpkg" >> $env:GITHUB_PATH

      - name: Setup MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Clear vcpkg registry cache
        run: |
          $cachePath = "$env:LOCALAPPDATA\vcpkg\registries"
          if (Test-Path $cachePath) {
            Remove-Item -Recurse -Force $cachePath
            Write-Host "Cleared vcpkg registry cache"
          }

      - name: Install dependencies via vcpkg
        run: |
          $args = @(
            "install",
            "--triplet", "${{ matrix.triplet }}",
            "--overlay-triplets=${{ github.workspace }}/vcpkg-custom-triplets",
            "--x-install-root=vcpkg_installed",
            "--clean-buildtrees-after-build"
          )
          if ("${{ matrix.arch }}" -eq "arm64") {
            $args += "--host-triplet=x64-windows"
          }
          & vcpkg @args

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} `
            -DVCPKG_OVERLAY_TRIPLETS=${{ github.workspace }}\vcpkg-custom-triplets `
            -DVCPKG_INSTALLED_DIR=${{ github.workspace }}\vcpkg_installed

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Prepare installation files
        shell: pwsh
        run: |
          cmake --install build --prefix staging

          # Static build — single executable, no DLLs or plugins to copy
          $exe = "staging\bin\hobbycad.exe"
          if (-not (Test-Path $exe)) {
              Write-Error "hobbycad.exe not found"
              exit 1
          }
          Write-Host "Static build produced: $exe"
          Write-Host "Size: $([math]::Round((Get-Item $exe).Length / 1MB, 1)) MB"

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $version = Select-String -Path CMakeLists.txt -Pattern 'project.*VERSION\s+([0-9.]+)' |
                     ForEach-Object { $_.Matches[0].Groups[1].Value }
          if (-not $version) { $version = "0.0.1" }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Create WiX source file
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"

          # Static build — single executable, no DLLs or plugin directories
          $wxs = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">
            <Package Name="HobbyCAD"
                     Manufacturer="HobbyCAD Project"
                     Version="$version"
                     UpgradeCode="E8F5A231-7B3C-4D5E-9F1A-2B3C4D5E6F7A"
                     Scope="perMachine">

              <MajorUpgrade DowngradeErrorMessage="A newer version of HobbyCAD is already installed." />
              <MediaTemplate EmbedCab="yes" />

              <StandardDirectory Id="ProgramFiles6432Folder">
                <Directory Id="INSTALLFOLDER" Name="HobbyCAD">
                  <Directory Id="BinFolder" Name="bin" />
                </Directory>
              </StandardDirectory>

              <StandardDirectory Id="ProgramMenuFolder">
                <Directory Id="ApplicationProgramsFolder" Name="HobbyCAD" />
              </StandardDirectory>

              <ComponentGroup Id="ProductComponents" Directory="BinFolder">
                <Component Id="MainExecutable" Guid="A1B2C3D4-E5F6-7890-ABCD-EF1234567890">
                  <File Id="HobbyCADExe" Source="staging\bin\hobbycad.exe" KeyPath="yes">
                    <Shortcut Id="StartMenuShortcut"
                              Directory="ApplicationProgramsFolder"
                              Name="HobbyCAD"
                              WorkingDirectory="BinFolder"
                              Icon="HobbyCADIcon"
                              IconIndex="0"
                              Advertise="yes" />
                  </File>
                  <ProgId Id="HobbyCAD.Project" Description="HobbyCAD Project">
                    <Extension Id="hcad" ContentType="application/x-hobbycad">
                      <Verb Id="open" Command="Open" TargetFile="HobbyCADExe" Argument="`"%1`"" />
                    </Extension>
                  </ProgId>
                </Component>
              </ComponentGroup>

              <Icon Id="HobbyCADIcon" SourceFile="staging\bin\hobbycad.exe" />

              <Feature Id="ProductFeature" Title="HobbyCAD" Level="1">
                <ComponentGroupRef Id="ProductComponents" />
              </Feature>

            </Package>
          </Wix>
          "@
          $wxs | Out-File -FilePath "hobbycad.wxs" -Encoding UTF8

      - name: Build MSI
        run: |
          wix build hobbycad.wxs -o HobbyCAD-${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}.msi

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: "*.msi"
          retention-days: 14
          if-no-files-found: error
