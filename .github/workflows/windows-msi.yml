# .github/workflows/windows-msi.yml
#
# Build HobbyCAD MSI installer using WiX Toolset.
#
# Creates MSI installers for enterprise deployment:
#   - Suitable for Group Policy / SCCM deployment
#   - Per-machine installation to Program Files
#   - Start menu shortcuts and file associations
#   - Clean uninstall via Add/Remove Programs
#
# Both x64 and arm64 architectures are supported.

name: Windows MSI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  workflow_dispatch:

jobs:

  # ================================================================
  #  MSI Installer via WiX
  # ================================================================
  #
  #  Builds MSI installers using WiX Toolset v4.
  #  Uses MSVC build output as the source.

  msi:
    name: HobbyCAD MSI (${{ matrix.arch }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            triplet: x64-windows
            msvc_arch: x64
            wix_arch: x64
            artifact_name: hobbycad-windows-x64-msi
          - arch: arm64
            triplet: arm64-windows
            msvc_arch: amd64_arm64
            wix_arch: arm64
            artifact_name: hobbycad-windows-arm64-msi

    env:
      BUILD_TYPE: Release
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - name: Checkout HobbyCAD
        uses: actions/checkout@v4

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        run: |
          if (Test-Path "C:\vcpkg\vcpkg.exe") {
              Write-Host "Using pre-installed vcpkg at C:\vcpkg"
          } elseif (Test-Path "C:\vcpkg") {
              & C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          } else {
              git clone --depth 1 https://github.com/microsoft/vcpkg.git C:\vcpkg
              & C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          }
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "C:\vcpkg" >> $env:GITHUB_PATH

      - name: Setup MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Install dependencies via vcpkg
        run: |
          vcpkg install --triplet ${{ matrix.triplet }} `
            --overlay-ports=${{ github.workspace }}/vcpkg-overlay-ports `
            --x-install-root=vcpkg_installed

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} `
            -DVCPKG_INSTALLED_DIR=${{ github.workspace }}\vcpkg_installed `
            -DVCPKG_OVERLAY_PORTS=${{ github.workspace }}\vcpkg-overlay-ports

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Prepare installation files
        shell: pwsh
        run: |
          $installDir = "staging"
          cmake --install build --prefix $installDir

          # Copy runtime DLLs
          $binDir = "$installDir\bin"
          $vcpkgBin = "${{ github.workspace }}\vcpkg_installed\${{ matrix.triplet }}\bin"

          # Qt plugins
          $qtPluginDir = "$installDir\bin\platforms"
          $vcpkgPlugins = "${{ github.workspace }}\vcpkg_installed\${{ matrix.triplet }}\plugins"
          New-Item -ItemType Directory -Force -Path $qtPluginDir | Out-Null
          Copy-Item "$vcpkgPlugins\platforms\qwindows.dll" $qtPluginDir -ErrorAction SilentlyContinue

          # Copy DLL dependencies
          $exePath = Get-ChildItem "$binDir\hobbycad.exe" -ErrorAction SilentlyContinue
          if ($exePath) {
              $deps = & dumpbin /dependents $exePath.FullName 2>$null |
                      Select-String '\.dll' |
                      ForEach-Object { $_.ToString().Trim() }
              foreach ($dll in $deps) {
                  $src = Join-Path $vcpkgBin $dll
                  if (Test-Path $src) {
                      Copy-Item $src $binDir -ErrorAction SilentlyContinue
                  }
              }
          }

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $version = Select-String -Path CMakeLists.txt -Pattern 'project.*VERSION\s+([0-9.]+)' |
                     ForEach-Object { $_.Matches[0].Groups[1].Value }
          if (-not $version) { $version = "0.0.1" }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Create WiX source file
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"

          @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">
            <Package Name="HobbyCAD"
                     Manufacturer="HobbyCAD Project"
                     Version="$version"
                     UpgradeCode="E8F5A231-7B3C-4D5E-9F1A-2B3C4D5E6F7A"
                     Scope="perMachine">

              <MajorUpgrade DowngradeErrorMessage="A newer version of HobbyCAD is already installed." />
              <MediaTemplate EmbedCab="yes" />

              <StandardDirectory Id="ProgramFiles6432Folder">
                <Directory Id="INSTALLFOLDER" Name="HobbyCAD">
                  <Directory Id="BinFolder" Name="bin">
                    <Directory Id="PlatformsFolder" Name="platforms" />
                  </Directory>
                </Directory>
              </StandardDirectory>

              <StandardDirectory Id="ProgramMenuFolder">
                <Directory Id="ApplicationProgramsFolder" Name="HobbyCAD" />
              </StandardDirectory>

              <ComponentGroup Id="ProductComponents" Directory="BinFolder">
                <Component Id="MainExecutable" Guid="A1B2C3D4-E5F6-7890-ABCD-EF1234567890">
                  <File Id="HobbyCADExe" Source="staging\bin\hobbycad.exe" KeyPath="yes">
                    <Shortcut Id="StartMenuShortcut"
                              Directory="ApplicationProgramsFolder"
                              Name="HobbyCAD"
                              WorkingDirectory="BinFolder"
                              Icon="HobbyCADIcon"
                              IconIndex="0"
                              Advertise="yes" />
                  </File>

                  <!-- File association for .hcad -->
                  <ProgId Id="HobbyCAD.Project" Description="HobbyCAD Project">
                    <Extension Id="hcad" ContentType="application/x-hobbycad">
                      <Verb Id="open" Command="Open" TargetFile="HobbyCADExe" Argument='"%1"' />
                    </Extension>
                  </ProgId>
                </Component>

                <Component Id="RuntimeDLLs" Guid="B2C3D4E5-F6A7-8901-BCDE-F23456789012">
                  <Files Include="staging\bin\*.dll" />
                </Component>
              </ComponentGroup>

              <ComponentGroup Id="PlatformPlugins" Directory="PlatformsFolder">
                <Component Id="QtPlatformPlugin" Guid="C3D4E5F6-A7B8-9012-CDEF-345678901234">
                  <Files Include="staging\bin\platforms\*.dll" />
                </Component>
              </ComponentGroup>

              <Icon Id="HobbyCADIcon" SourceFile="staging\bin\hobbycad.exe" />

              <Feature Id="ProductFeature" Title="HobbyCAD" Level="1">
                <ComponentGroupRef Id="ProductComponents" />
                <ComponentGroupRef Id="PlatformPlugins" />
              </Feature>

            </Package>
          </Wix>
          "@ | Out-File -FilePath "hobbycad.wxs" -Encoding UTF8

      - name: Build MSI
        run: |
          wix build hobbycad.wxs -o HobbyCAD-${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}.msi

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: "*.msi"
          retention-days: 14
          if-no-files-found: error
