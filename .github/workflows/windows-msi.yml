# .github/workflows/windows-msi.yml
#
# Build HobbyCAD MSI installer using WiX Toolset.
#
# Creates MSI installers for enterprise deployment:
#   - Suitable for Group Policy / SCCM deployment
#   - Per-machine installation to Program Files
#   - Start menu shortcuts and file associations
#   - Clean uninstall via Add/Remove Programs
#
# Both x64 and arm64 architectures are supported.

name: Windows MSI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  workflow_dispatch:

env:
  ACTIONS_STEP_DEBUG: true
  ACTIONS_RUNNER_DEBUG: true

jobs:

  # ================================================================
  #  MSI Installer via WiX
  # ================================================================
  #
  #  Builds MSI installers using WiX Toolset v4.
  #  Uses MSVC build output as the source.

  msi:
    name: HobbyCAD MSI (${{ matrix.arch }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            triplet: x64-windows
            msvc_arch: x64
            wix_arch: x64
            artifact_name: hobbycad-windows-x64-msi
          - arch: arm64
            triplet: arm64-windows
            msvc_arch: amd64_arm64
            wix_arch: arm64
            artifact_name: hobbycad-windows-arm64-msi

    env:
      BUILD_TYPE: Release
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - name: Checkout HobbyCAD
        uses: actions/checkout@v4

      - name: Free disk space
        shell: pwsh
        run: |
          # Remove large pre-installed components to free disk for vcpkg builds
          $dirs = @(
            "C:\Android",
            "C:\Program Files\dotnet\sdk",
            "C:\Program Files\dotnet\shared",
            "C:\Program Files\LLVM",
            "C:\Program Files (x86)\Microsoft SDKs\Azure",
            "C:\Program Files\MongoDB",
            "C:\Program Files\PostgreSQL"
          )
          foreach ($d in $dirs) {
            if (Test-Path $d) {
              Write-Host "Removing $d ..."
              Remove-Item -Recurse -Force $d -ErrorAction SilentlyContinue
            }
          }
          # Show available space
          Get-PSDrive C | Select-Object Used,Free | Format-Table -AutoSize

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        run: |
          if (Test-Path "C:\vcpkg\vcpkg.exe") {
              Write-Host "Using pre-installed vcpkg at C:\vcpkg"
          } elseif (Test-Path "C:\vcpkg") {
              & C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          } else {
              git clone --depth 1 https://github.com/microsoft/vcpkg.git C:\vcpkg
              & C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          }
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "C:\vcpkg" >> $env:GITHUB_PATH

      - name: Setup MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Install dependencies via vcpkg
        run: |
          vcpkg install --triplet ${{ matrix.triplet }} `
            --overlay-ports=${{ github.workspace }}/vcpkg-overlay-ports `
            --x-install-root=vcpkg_installed

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} `
            -DVCPKG_INSTALLED_DIR=${{ github.workspace }}\vcpkg_installed `
            -DVCPKG_OVERLAY_PORTS=${{ github.workspace }}\vcpkg-overlay-ports

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Prepare installation files
        shell: pwsh
        run: |
          $installDir = "staging"
          cmake --install build --prefix $installDir

          # Copy runtime DLLs
          $binDir = "$installDir\bin"
          $vcpkgBin = "${{ github.workspace }}\vcpkg_installed\${{ matrix.triplet }}\bin"

          # Qt plugins
          $qtPluginDir = "$installDir\bin\platforms"
          $vcpkgPlugins = "${{ github.workspace }}\vcpkg_installed\${{ matrix.triplet }}\plugins"
          New-Item -ItemType Directory -Force -Path $qtPluginDir | Out-Null
          Copy-Item "$vcpkgPlugins\platforms\qwindows.dll" $qtPluginDir -ErrorAction SilentlyContinue

          # Copy DLL dependencies
          $exePath = Get-ChildItem "$binDir\hobbycad.exe" -ErrorAction SilentlyContinue
          if ($exePath) {
              $deps = & dumpbin /dependents $exePath.FullName 2>$null |
                      Select-String '\.dll' |
                      ForEach-Object { $_.ToString().Trim() }
              foreach ($dll in $deps) {
                  $src = Join-Path $vcpkgBin $dll
                  if (Test-Path $src) {
                      Copy-Item $src $binDir -ErrorAction SilentlyContinue
                  }
              }
          }

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $version = Select-String -Path CMakeLists.txt -Pattern 'project.*VERSION\s+([0-9.]+)' |
                     ForEach-Object { $_.Matches[0].Groups[1].Value }
          if (-not $version) { $version = "0.0.1" }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Create WiX source file
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"

          # Enumerate DLLs dynamically - <Files> glob not valid inside <Component>
          $dllComponents = (Get-ChildItem "staging\bin\*.dll" | ForEach-Object {
            $id = "Dll" + ($_.Name -replace '[^a-zA-Z0-9]', '')
            "            <Component Id=`"$id`" Guid=`"*`"><File Source=`"staging\bin\$($_.Name)`" /></Component>"
          }) -join "`n"

          $platComponents = (Get-ChildItem "staging\bin\platforms\*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
            $id = "Plat" + ($_.Name -replace '[^a-zA-Z0-9]', '')
            "            <Component Id=`"$id`" Guid=`"*`"><File Source=`"staging\bin\platforms\$($_.Name)`" /></Component>"
          }) -join "`n"

          $wxs = '<?xml version="1.0" encoding="UTF-8"?>' + "`n"
          $wxs += '<Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">' + "`n"
          $wxs += '  <Package Name="HobbyCAD"' + "`n"
          $wxs += '           Manufacturer="HobbyCAD Project"' + "`n"
          $wxs += "           Version=`"$version`"" + "`n"
          $wxs += '           UpgradeCode="E8F5A231-7B3C-4D5E-9F1A-2B3C4D5E6F7A"' + "`n"
          $wxs += '           Scope="perMachine">' + "`n"
          $wxs += "`n"
          $wxs += '    <MajorUpgrade DowngradeErrorMessage="A newer version of HobbyCAD is already installed." />' + "`n"
          $wxs += '    <MediaTemplate EmbedCab="yes" />' + "`n"
          $wxs += "`n"
          $wxs += '    <StandardDirectory Id="ProgramFiles6432Folder">' + "`n"
          $wxs += '      <Directory Id="INSTALLFOLDER" Name="HobbyCAD">' + "`n"
          $wxs += '        <Directory Id="BinFolder" Name="bin">' + "`n"
          $wxs += '          <Directory Id="PlatformsFolder" Name="platforms" />' + "`n"
          $wxs += '        </Directory>' + "`n"
          $wxs += '      </Directory>' + "`n"
          $wxs += '    </StandardDirectory>' + "`n"
          $wxs += "`n"
          $wxs += '    <StandardDirectory Id="ProgramMenuFolder">' + "`n"
          $wxs += '      <Directory Id="ApplicationProgramsFolder" Name="HobbyCAD" />' + "`n"
          $wxs += '    </StandardDirectory>' + "`n"
          $wxs += "`n"
          $wxs += '    <ComponentGroup Id="ProductComponents" Directory="BinFolder">' + "`n"
          $wxs += '      <Component Id="MainExecutable" Guid="A1B2C3D4-E5F6-7890-ABCD-EF1234567890">' + "`n"
          $wxs += '        <File Id="HobbyCADExe" Source="staging\bin\hobbycad.exe" KeyPath="yes">' + "`n"
          $wxs += '          <Shortcut Id="StartMenuShortcut"' + "`n"
          $wxs += '                    Directory="ApplicationProgramsFolder"' + "`n"
          $wxs += '                    Name="HobbyCAD"' + "`n"
          $wxs += '                    WorkingDirectory="BinFolder"' + "`n"
          $wxs += '                    Icon="HobbyCADIcon"' + "`n"
          $wxs += '                    IconIndex="0"' + "`n"
          $wxs += '                    Advertise="yes" />' + "`n"
          $wxs += '        </File>' + "`n"
          $wxs += '        <ProgId Id="HobbyCAD.Project" Description="HobbyCAD Project">' + "`n"
          $wxs += '          <Extension Id="hcad" ContentType="application/x-hobbycad">' + "`n"
          $wxs += '            <Verb Id="open" Command="Open" TargetFile="HobbyCADExe" Argument=''"%1"'' />' + "`n"
          $wxs += '          </Extension>' + "`n"
          $wxs += '        </ProgId>' + "`n"
          $wxs += '      </Component>' + "`n"
          $wxs += $dllComponents + "`n"
          $wxs += '    </ComponentGroup>' + "`n"
          $wxs += "`n"
          $wxs += '    <ComponentGroup Id="PlatformPlugins" Directory="PlatformsFolder">' + "`n"
          $wxs += $platComponents + "`n"
          $wxs += '    </ComponentGroup>' + "`n"
          $wxs += "`n"
          $wxs += '    <Icon Id="HobbyCADIcon" SourceFile="staging\bin\hobbycad.exe" />' + "`n"
          $wxs += "`n"
          $wxs += '    <Feature Id="ProductFeature" Title="HobbyCAD" Level="1">' + "`n"
          $wxs += '      <ComponentGroupRef Id="ProductComponents" />' + "`n"
          $wxs += '      <ComponentGroupRef Id="PlatformPlugins" />' + "`n"
          $wxs += '    </Feature>' + "`n"
          $wxs += "`n"
          $wxs += '  </Package>' + "`n"
          $wxs += '</Wix>'
          $wxs | Out-File -FilePath "hobbycad.wxs" -Encoding UTF8

      - name: Build MSI
        run: |
          wix build hobbycad.wxs -o HobbyCAD-${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}.msi

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: "*.msi"
          retention-days: 14
          if-no-files-found: error
