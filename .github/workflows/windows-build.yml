# .github/workflows/windows-build.yml
#
# Build HobbyCAD on Windows for x64 and arm64 using two toolchains:
#   - MSYS2 UCRT64 with GCC and pacman packages (x64 only)
#   - MSVC with vcpkg manifest mode (x64 and arm64)
#
# The MSYS2 job matches the local developer setup from
# tools/windows/setup-env.ps1 (GCC, Ninja, pacman).
# The MSVC job tests MSVC/cl.exe compatibility using the
# pinned versions in vcpkg.json + vcpkg-configuration.json.
#
# First MSVC build is slow (~30 min) due to Qt6/OCCT
# compilation.  Subsequent builds use GitHub Actions cache
# via vcpkg binary caching, reducing install to ~2 min.
# MSYS2 builds use pre-built pacman packages (fast).

name: Windows Build

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  workflow_dispatch:

env:
  ACTIONS_STEP_DEBUG: true
  ACTIONS_RUNNER_DEBUG: true

jobs:

  # ================================================================
  #  MSYS2 / UCRT64 / GCC (x64 only)
  # ================================================================
  #
  #  Matches the local developer environment.  All dependencies
  #  come from MSYS2 pacman (pre-built, fast).
  #  Note: MSYS2 does not support ARM64 Windows.

  msys2:
    name: HobbyCAD via MSYS2 (x64)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Disable autocrlf
        run: git config --global core.autocrlf input
        shell: bash

      - name: Checkout HobbyCAD
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-opencascade
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-svg
            mingw-w64-ucrt-x86_64-qt6-tools
            mingw-w64-ucrt-x86_64-libgit2
            mingw-w64-ucrt-x86_64-librsvg
            mingw-w64-ucrt-x86_64-ntldd
            mingw-w64-ucrt-x86_64-eigen3
            git
            patch

      # libslvs is not available as an MSYS2 package - build from PPA source
      - name: Build libslvs from source
        shell: msys2 {0}
        run: |
          curl -L -o /tmp/libslvs.tar.gz "https://launchpad.net/~ayourk/+archive/ubuntu/hobbycad/+sourcefiles/libslvs/3.2.git~20260208-1~ppa2~noble1/libslvs_3.2.git~20260208.orig.tar.gz"
          mkdir -p /tmp/solvespace && tar -xzf /tmp/libslvs.tar.gz -C /tmp/solvespace --strip-components=1
          curl -L -o /tmp/libslvs.debian.tar.xz "https://launchpad.net/~ayourk/+archive/ubuntu/hobbycad/+sourcefiles/libslvs/3.2.git~20260208-1~ppa2~noble1/libslvs_3.2.git~20260208-1~ppa2~noble1.debian.tar.xz"
          tar -xJf /tmp/libslvs.debian.tar.xz -C /tmp/solvespace
          cd /tmp/solvespace && patch -p1 < debian/patches/0001-handle-missing-git-directory.patch

          # Stub empty submodule directories
          for submod in zlib libpng freetype cairo pixman angle mimalloc; do
            mkdir -p extlib/$submod
            echo "# stub" > extlib/$submod/CMakeLists.txt
          done

          # Populate Eigen headers from MSYS2 system package
          mkdir -p extlib/eigen
          cp -r /ucrt64/include/eigen3/. extlib/eigen/

          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/ucrt64 \
            -DCMAKE_CXX_STANDARD=14 \
            -DBUILD_LIB=ON \
            -DENABLE_GUI=OFF \
            -DENABLE_CLI=OFF \
            -DENABLE_OPENMP=OFF \
            -DENABLE_TESTS=OFF
          cmake --build build

          # Install libslvs to MSYS2 prefix
          cp build/libslvs.dll.a /ucrt64/lib/
          cp build/libslvs.dll /ucrt64/bin/
          mkdir -p /ucrt64/include/slvs
          cp include/slvs.h /ucrt64/include/slvs/

      - name: Configure CMake
        run: cmake --preset msys2-release

      - name: Build
        run: cmake --build --preset msys2-release

      - name: Package build
        run: |
          cmake --install build --prefix build/install

          # Copy runtime DLLs from UCRT64
          BINDIR="build/install/bin"
          if [ -f "$BINDIR/hobbycad.exe" ]; then
              # Use ntldd to find DLL dependencies
              ntldd -R "$BINDIR/hobbycad.exe" 2>/dev/null | \
                  grep -i '/ucrt64/' | \
                  awk '{print $3}' | \
                  while read dll; do
                      cp -n "$dll" "$BINDIR/" 2>/dev/null || true
                  done || true

              # Qt plugins
              QT_PLUGIN_DIR="/ucrt64/share/qt6/plugins"
              if [ -d "$QT_PLUGIN_DIR/platforms" ]; then
                  mkdir -p "$BINDIR/platforms"
                  cp "$QT_PLUGIN_DIR/platforms/qwindows.dll" \
                      "$BINDIR/platforms/" 2>/dev/null || true
              fi
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hobbycad-windows-x64-msys2
          path: build/install/
          retention-days: 14
          if-no-files-found: error

  # ================================================================
  #  MSVC / vcpkg (x64 and arm64)
  # ================================================================
  #
  #  Tests MSVC compatibility using the version-pinned
  #  dependencies declared in vcpkg.json.

  msvc:
    name: HobbyCAD via MSVC (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            triplet: x64-windows
            msvc_arch: x64
            artifact_name: hobbycad-windows-x64-msvc
          - arch: arm64
            runner: windows-latest
            triplet: arm64-windows
            msvc_arch: amd64_arm64
            artifact_name: hobbycad-windows-arm64-msvc

    env:
      BUILD_TYPE: Release
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - name: Checkout HobbyCAD
        uses: actions/checkout@v4

      - name: Free disk space
        shell: pwsh
        run: |
          # Remove large pre-installed components to free disk for vcpkg builds
          $dirs = @(
            "C:\Android",
            "C:\Program Files\dotnet\sdk",
            "C:\Program Files\dotnet\shared",
            "C:\Program Files\LLVM",
            "C:\Program Files (x86)\Microsoft SDKs\Azure",
            "C:\Program Files\MongoDB",
            "C:\Program Files\PostgreSQL"
          )
          foreach ($d in $dirs) {
            if (Test-Path $d) {
              Write-Host "Removing $d ..."
              Remove-Item -Recurse -Force $d -ErrorAction SilentlyContinue
            }
          }
          # Show available space
          Get-PSDrive C | Select-Object Used,Free | Format-Table -AutoSize

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        run: |
          # Use the pre-installed vcpkg on the runner, or clone fresh
          if (Test-Path "C:\vcpkg\vcpkg.exe") {
              Write-Host "Using pre-installed vcpkg at C:\vcpkg"
          } elseif (Test-Path "C:\vcpkg") {
              Write-Host "Bootstrapping existing C:\vcpkg..."
              & C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          } else {
              Write-Host "Cloning vcpkg..."
              git clone --depth 1 https://github.com/microsoft/vcpkg.git C:\vcpkg
              & C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          }
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "C:\vcpkg" >> $env:GITHUB_PATH

      - name: Setup MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Install dependencies via vcpkg
        run: |
          vcpkg install --triplet ${{ matrix.triplet }} `
            --overlay-ports=${{ github.workspace }}/vcpkg-overlay-ports `
            --x-install-root=vcpkg_installed

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} `
            -DVCPKG_INSTALLED_DIR=${{ github.workspace }}\vcpkg_installed `
            -DVCPKG_OVERLAY_PORTS=${{ github.workspace }}\vcpkg-overlay-ports

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Package build
        shell: pwsh
        run: |
          $installDir = "build\install"
          cmake --install build --prefix $installDir

          # Copy Qt and OCCT runtime DLLs alongside the executable
          $binDir = "$installDir\bin"
          $vcpkgBin = "${{ github.workspace }}\vcpkg_installed\${{ matrix.triplet }}\bin"

          # Qt plugins needed at runtime
          $qtPluginDir = "$installDir\bin\platforms"
          $vcpkgPlugins = "${{ github.workspace }}\vcpkg_installed\${{ matrix.triplet }}\plugins"
          New-Item -ItemType Directory -Force -Path $qtPluginDir | Out-Null
          Copy-Item "$vcpkgPlugins\platforms\qwindows.dll" $qtPluginDir -ErrorAction SilentlyContinue

          # Copy all runtime DLLs the executable needs
          $exePath = Get-ChildItem "$binDir\hobbycad.exe" -ErrorAction SilentlyContinue
          if ($exePath) {
              $deps = & dumpbin /dependents $exePath.FullName 2>$null |
                      Select-String '\.dll' |
                      ForEach-Object { $_.ToString().Trim() }
              foreach ($dll in $deps) {
                  $src = Join-Path $vcpkgBin $dll
                  if (Test-Path $src) {
                      Copy-Item $src $binDir -ErrorAction SilentlyContinue
                  }
              }
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/install/
          retention-days: 14
          if-no-files-found: error
