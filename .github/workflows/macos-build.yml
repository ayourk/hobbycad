# .github/workflows/macos-build.yml
#
# Build HobbyCAD on macOS arm64 (Apple Silicon) using vcpkg with
# static linking.  All third-party dependencies are statically linked
# into the executable; only macOS system frameworks remain dynamic.
#
# First build is slow (~45 min) due to Qt6/OCCT compilation.
# Subsequent builds use GitHub Actions cache via vcpkg binary
# caching, reducing install to ~2 min.

name: macOS Build

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  workflow_dispatch:

env:
  ACTIONS_STEP_DEBUG: true
  ACTIONS_RUNNER_DEBUG: true

jobs:

  macos:
    name: HobbyCAD macOS (arm64)
    runs-on: macos-latest

    env:
      BUILD_TYPE: Release
      VCPKG_DEFAULT_TRIPLET: arm64-osx-static
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - name: Checkout HobbyCAD
        uses: actions/checkout@v4

      - name: Install build tools
        run: brew install ninja

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git ~/vcpkg
          cd ~/vcpkg
          # Fetch the baseline tag required by vcpkg-configuration.json
          git fetch --depth 1 origin tag 2026.01.16
          ~/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV
          echo "$HOME/vcpkg" >> $GITHUB_PATH

      - name: Install dependencies via vcpkg
        run: |
          vcpkg install --triplet arm64-osx-static \
            --overlay-triplets=${{ github.workspace }}/vcpkg-custom-triplets \
            --overlay-ports=${{ github.workspace }}/vcpkg-overlay-ports \
            --x-install-root=vcpkg_installed \
            --clean-buildtrees-after-build

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_TOOLCHAIN_FILE=$HOME/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=arm64-osx-static \
            -DVCPKG_OVERLAY_TRIPLETS=${{ github.workspace }}/vcpkg-custom-triplets \
            -DVCPKG_INSTALLED_DIR=${{ github.workspace }}/vcpkg_installed \
            -DVCPKG_OVERLAY_PORTS=${{ github.workspace }}/vcpkg-overlay-ports

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Package build
        run: |
          cmake --install build --prefix build/install

          # Static build — single executable, no dylibs to bundle
          exe="build/install/bin/hobbycad"
          if [ ! -f "$exe" ]; then
            echo "::error::hobbycad not found at $exe"
            exit 1
          fi
          echo "Static build produced: $exe"
          echo "Size: $(du -h "$exe" | cut -f1)"
          echo "Architecture: $(file "$exe")"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hobbycad-macos-arm64
          path: build/install/
          retention-days: 14
          if-no-files-found: error
