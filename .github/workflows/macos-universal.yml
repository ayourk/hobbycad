# .github/workflows/macos-universal.yml
#
# Build a macOS universal binary (arm64 + x86_64) on a free Apple
# Silicon runner using vcpkg with static linking.
#
# Both architecture slices are built using vcpkg static triplets.
# Apple Clang natively supports cross-compilation to x86_64 on arm64
# hosts, so no Rosetta or separate x86_64 Homebrew installation is
# needed.  The two binaries are merged with lipo.
#
# All third-party dependencies are statically linked; only macOS
# system frameworks remain dynamic.

name: macOS Universal

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  workflow_dispatch:

env:
  ACTIONS_STEP_DEBUG: true
  ACTIONS_RUNNER_DEBUG: true

jobs:

  universal:
    name: HobbyCAD macOS (universal)
    runs-on: macos-latest

    env:
      BUILD_TYPE: Release
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - name: Checkout HobbyCAD
        uses: actions/checkout@v4

      - name: Install build tools
        run: brew install ninja

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git ~/vcpkg
          cd ~/vcpkg
          # Fetch the baseline tag required by vcpkg-configuration.json
          git fetch --depth 1 origin tag 2026.01.16
          ~/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV
          echo "$HOME/vcpkg" >> $GITHUB_PATH

      # ── Install dependencies for both architectures ─────────────
      - name: Install arm64 dependencies via vcpkg
        run: |
          vcpkg install --triplet arm64-osx-static \
            --overlay-triplets=${{ github.workspace }}/vcpkg-custom-triplets \
            --overlay-ports=${{ github.workspace }}/vcpkg-overlay-ports \
            --x-install-root=vcpkg_installed \
            --clean-buildtrees-after-build

      - name: Install x86_64 dependencies via vcpkg
        run: |
          vcpkg install --triplet x64-osx-static \
            --overlay-triplets=${{ github.workspace }}/vcpkg-custom-triplets \
            --overlay-ports=${{ github.workspace }}/vcpkg-overlay-ports \
            --x-install-root=vcpkg_installed \
            --clean-buildtrees-after-build

      # ── Build arm64 ─────────────────────────────────────────────
      - name: Build arm64
        run: |
          cmake -B build-arm64 -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_TOOLCHAIN_FILE=$HOME/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=arm64-osx-static \
            -DVCPKG_OVERLAY_TRIPLETS=${{ github.workspace }}/vcpkg-custom-triplets \
            -DVCPKG_INSTALLED_DIR=${{ github.workspace }}/vcpkg_installed \
            -DVCPKG_OVERLAY_PORTS=${{ github.workspace }}/vcpkg-overlay-ports \
            -DCMAKE_OSX_ARCHITECTURES=arm64

          cmake --build build-arm64 --config ${{ env.BUILD_TYPE }}
          cmake --install build-arm64 --prefix install-arm64

      # ── Build x86_64 (cross-compiled from arm64) ────────────────
      - name: Build x86_64
        run: |
          cmake -B build-x86_64 -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_TOOLCHAIN_FILE=$HOME/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=x64-osx-static \
            -DVCPKG_OVERLAY_TRIPLETS=${{ github.workspace }}/vcpkg-custom-triplets \
            -DVCPKG_INSTALLED_DIR=${{ github.workspace }}/vcpkg_installed \
            -DVCPKG_OVERLAY_PORTS=${{ github.workspace }}/vcpkg-overlay-ports \
            -DCMAKE_OSX_ARCHITECTURES=x86_64

          cmake --build build-x86_64 --config ${{ env.BUILD_TYPE }}
          cmake --install build-x86_64 --prefix install-x86_64

      # ── Merge into universal binary ─────────────────────────────
      - name: Create universal binary
        run: |
          mkdir -p install-universal

          # Copy the arm64 install as the base (preserves directory structure)
          cp -R install-arm64/ install-universal/

          # Merge every Mach-O binary with lipo
          find install-arm64 -type f | while read arm64_file; do
            rel="${arm64_file#install-arm64/}"
            x86_file="install-x86_64/$rel"
            out_file="install-universal/$rel"

            if [ -f "$x86_file" ] && file "$arm64_file" | grep -q "Mach-O"; then
              lipo -create "$arm64_file" "$x86_file" -output "$out_file" 2>/dev/null || \
                echo "::warning::lipo failed for $rel, keeping arm64 only"
            fi
          done

          # Verify the binary is universal
          exe="install-universal/bin/hobbycad"
          echo "Universal binary:"
          file "$exe"
          echo "Size: $(du -h "$exe" | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hobbycad-macos-universal
          path: install-universal/
          retention-days: 14
          if-no-files-found: error
