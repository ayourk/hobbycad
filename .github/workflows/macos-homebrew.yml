# .github/workflows/macos-homebrew.yml
#
# Test HobbyCAD Homebrew formula installation on macOS.
#
# This workflow tests that the Homebrew formula in ayourk/homebrew-hobbycad
# builds and installs correctly. It does not publish to Homebrew - that
# is handled by the homebrew-hobbycad repository.
#
# Both arm64 (Apple Silicon) and x86_64 (Intel) are tested.

name: macOS Homebrew

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
      - 'LICENSE'
      - '*.md'
  workflow_dispatch:

jobs:

  # ================================================================
  #  Homebrew Formula Test
  # ================================================================
  #
  #  Tests the Homebrew formula from ayourk/homebrew-hobbycad tap.
  #  Builds from source to verify the formula works with current code.

  homebrew:
    name: HobbyCAD Homebrew (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
            artifact_name: hobbycad-homebrew-arm64
          - arch: x86_64
            runner: macos-13
            artifact_name: hobbycad-homebrew-x64

    steps:
      - name: Checkout HobbyCAD
        uses: actions/checkout@v4

      - name: Set up Homebrew
        run: |
          # Ensure Homebrew is up to date
          brew update

      - name: Tap HobbyCAD repository
        run: |
          brew tap ayourk/hobbycad

      - name: Install HobbyCAD dependencies
        run: |
          # Install dependencies from tap (keg-only, pinned versions)
          brew install ayourk/hobbycad/opencascade@7.6.3
          brew install ayourk/hobbycad/libzip@1.7.3
          brew install ayourk/hobbycad/libgit2@1.7.2
          brew install ayourk/hobbycad/libslvs
          brew install ayourk/hobbycad/lib3mf
          brew install ayourk/hobbycad/openmesh
          brew install ayourk/hobbycad/meshfix

          # Install standard dependencies
          brew install qt@6 ninja librsvg

      - name: Set CMAKE_PREFIX_PATH
        run: |
          OCCT_PFX=$(brew --prefix ayourk/hobbycad/opencascade@7.6.3)
          LZIP_PFX=$(brew --prefix ayourk/hobbycad/libzip@1.7.3)
          LGIT_PFX=$(brew --prefix ayourk/hobbycad/libgit2@1.7.2)
          SLVS_PFX=$(brew --prefix ayourk/hobbycad/libslvs)
          L3MF_PFX=$(brew --prefix ayourk/hobbycad/lib3mf)
          OMSH_PFX=$(brew --prefix ayourk/hobbycad/openmesh)
          MFIX_PFX=$(brew --prefix ayourk/hobbycad/meshfix)
          QT6_PFX=$(brew --prefix qt@6)

          PREFIX_PATH="${OCCT_PFX}:${LZIP_PFX}:${LGIT_PFX}:${SLVS_PFX}:${L3MF_PFX}:${OMSH_PFX}:${MFIX_PFX}:${QT6_PFX}"
          echo "CMAKE_PREFIX_PATH=${PREFIX_PATH}" >> "$GITHUB_ENV"

      - name: Build HobbyCAD
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=install

          cmake --build build
          cmake --install build

      - name: Create Homebrew-style package
        run: |
          # Create a tarball similar to what Homebrew would install
          cd install
          tar -czvf ../hobbycad-homebrew-${{ matrix.arch }}.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: "*.tar.gz"
          retention-days: 14
          if-no-files-found: error
